name: scheduled-jobs

on:
  workflow_dispatch:
    inputs:
      job:
        description: "実行するジョブ"
        required: true
        type: choice
        options:
          - consolidate
          - privacy-audit

# 定期実行したい場合は、運用が安定してから schedule を追加してください。
# 例:
# schedule:
#   - cron: "0 23 * * 0"  # consolidate: 月曜 08:00 JST
#   - cron: "0 23 1 * *"  # privacy-audit: 毎月2日 08:00 JST

concurrency:
  group: scheduled-jobs
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Authenticate Codex
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          printf '%s' "$OPENAI_API_KEY" | codex login --with-api-key \
            || codex login --api-key "$OPENAI_API_KEY"

      - name: Run job
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          codex exec --sandbox danger-full-access \
            "prompts/${{ inputs.job }}.md を読み、その手順に従って実行してください。ここは CI 環境なので、commit と push はワークフロー側が行います。あなたはファイルの読み書きまでを行ってください。" \
            < /dev/null

      - name: Commit and push results
        run: |
          git config user.name "scheduled-jobs[bot]"
          git config user.email "actions@users.noreply.github.com"
          git add context minutes
          if git diff --cached --quiet; then
            echo "::notice::No changes to commit"
          else
            git commit -m "chore: scheduled ${{ inputs.job }} run"
            git pull --rebase origin main
            git push origin main
          fi
